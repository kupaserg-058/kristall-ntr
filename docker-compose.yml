services:
  db:
    image: postgres:16
    container_name: kristall-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kristall
    ports:
      - "5433:5432"
    volumes:
      - kristall_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kristall"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kristall_pgdata:
